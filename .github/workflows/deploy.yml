# Deploys app/ to GitHub Pages on every push to main (PRD §6 phase 12 / §8.8
# Phase E). The app is build-free, so "deploy" is just uploading app/ as-is —
# no install, no bundler. One-time repo setup: Settings → Pages → Source must
# be set to "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - id: deployment
        uses: actions/deploy-pages@v4
