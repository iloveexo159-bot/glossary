<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiSearch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Literata:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-state">

    <nav id="top-bar">
        <button id="back-btn" aria-label="Go Back">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>

        <h1 class="logo" id="home-logo">WikiSearch</h1>
        
        <div class="search-layout">
            <div class="input-container">
                <input type="text" id="search-input" placeholder="" autocomplete="off">
                <ul id="suggestions-list" class="hidden"></ul>
            </div>
            <button id="search-btn">Search</button>
        </div>

        <button id="flashcards-btn">
            My Flashcards
            <span id="flashcard-badge" class="hidden">0</span>
        </button>
    </nav>

    <main>
        <article id="content-display" class="hidden">
            <div id="drift-notification" class="hidden">
                <div class="notification-content">
                    <svg class="alert-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    <span>This article has been updated since your last save.</span>
                </div>
                <button id="sync-version-btn">Update & Align Highlights</button>
            </div>

            <div class="article-header">
                <h2 id="term-title">Term Title</h2>
                <button id="save-term-btn" aria-label="Save Article">
                    <svg id="bookmark-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                    </svg>
                </button>
            </div>
            <hr class="divider">
            <img id="term-image" class="hidden" src="" alt="Cover image">
            <p id="term-description">The introductory paragraph will appear here...</p>
        </article>

        <section id="flashcards-display" class="hidden">
            <div class="article-header">
                <h2 id="flashcards-header-title">My Flashcards</h2>
            </div>
            <hr class="divider">
            <div id="flashcards-grid"></div>
        </section>
    </main>

    <div id="highlight-tooltip" class="hidden">
        <button id="tooltip-note-btn">Note</button>
        <div class="tooltip-divider"></div>
        <button id="tooltip-save-btn">Save</button>
    </div>

    <div id="inline-note-editor" class="hidden">
        <textarea id="note-input" placeholder="Add note..."></textarea>
        <div id="tag-container"></div> 
        <input type="text" id="tag-input" placeholder="Add tags (press space)..." autocomplete="off">
        <div class="editor-actions">
            <button id="editor-cancel">Cancel</button>
            <button id="editor-save">Save</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
